<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Linux Terminal Simulator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="terminal">
            <div id="output"></div>
            <div id="input-line">
                <span class="prompt">$</span>
                <input type="text" id="command-input" autofocus autocomplete="off">
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
